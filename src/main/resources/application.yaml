server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/student_management
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update


    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
